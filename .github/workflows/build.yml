name: Build Attendance Dashboard

# Tự động chạy mỗi khi có push làm thay đổi data/latest.xlsx, template.html, hoặc build.py
# Cũng có thể chạy tay từ tab "Actions" trên GitHub (nút "Run workflow")
on:
  push:
    branches: [main]
    paths:
      - "data/latest.xlsx"
      - "template.html"
      - "build.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Build index.html from latest.xlsx
        run: python3 build.py

      - name: Commit and push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "Không có thay đổi để commit" || git commit -m "Auto-build dashboard from data/latest.xlsx [skip ci]"
          git push
