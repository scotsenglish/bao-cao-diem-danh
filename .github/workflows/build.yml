name: Build Dashboard (manual override / code edits)

# Workflow NÀY chỉ dùng cho 2 trường hợp:
#   1. Bạn tự tay đè file Excel vào data/latest.xlsx (ví dụ scraper tự động
#      bị lỗi, bạn chạy tay script export cũ rồi upload thay thế)
#   2. Bạn sửa template.html hoặc build.py và muốn build lại ngay
# Việc lấy dữ liệu tự động theo lịch nằm ở workflow riêng:
# .github/workflows/scrape-and-build.yml (chạy 06:00/12:00/18:00 hàng ngày)
#
# Lưu ý: các commit từ scrape-and-build.yml có "[skip ci]" trong message nên
# sẽ KHÔNG kích hoạt lại workflow này, tránh chạy 2 lần thừa.
on:
  push:
    branches: [main]
    paths:
      - "data/latest.xlsx"
      - "template.html"
      - "build.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Build index.html from latest.xlsx
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: python3 build.py

      - name: Commit and push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "Không có thay đổi để commit" || git commit -m "Auto-build dashboard from data/latest.xlsx [skip ci]"

          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push thành công."
              break
            fi
            echo "Push bị từ chối (lần $i) — đang pull --rebase rồi thử lại..."
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase bị xung đột thật sự — dùng phương án an toàn: giữ nguyên" \
                   "index.html vừa build (file này tự sinh ra, không cần giữ lịch sử chi tiết)."
              git rebase --abort
              git reset --hard origin/main
              git add index.html
              git diff --staged --quiet && echo "Không có gì khác để commit" || git commit -m "Auto-build dashboard from data/latest.xlsx [skip ci]"
            fi
            if [ "$i" -eq 5 ]; then
              echo "Đã thử 5 lần vẫn không push được — dừng lại, cần kiểm tra thủ công."
              exit 1
            fi
          done
