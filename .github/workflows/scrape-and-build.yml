name: Scrape & Build Attendance Dashboard

# Tự động chạy 3 lần/ngày theo giờ Việt Nam (UTC+7): 06:00, 12:00, 18:00
# = 23:00 (hôm trước), 05:00, 11:00 giờ UTC.
# Cũng có thể chạy tay từ tab "Actions" trên GitHub (nút "Run workflow").
on:
  schedule:
    - cron: "0 23 * * *"  # 06:00 giờ VN
    - cron: "0 5 * * *"   # 12:00 giờ VN
    - cron: "0 11 * * *"  # 18:00 giờ VN
  workflow_dispatch:
    inputs:
      months_back:
        description: '"all" = lấy toàn bộ lịch sử (mặc định). Hoặc nhập số tháng (vd "3") để chỉ lấy gần đây, chạy nhanh hơn.'
        required: false
        default: "all"
      detail_months_back:
        description: 'Số tháng gần nhất cho tab "Chi tiết" (Number/List of Student). Mặc định 2. KHÔNG nên để "all" — 2 sheet raw này rất nặng nếu để cả năm.'
        required: false
        default: "2"

permissions:
  contents: write

# Nếu job trước còn đang chạy (ví dụ do resume checkpoint) thì job mới
# không chạy chồng lên, tránh 2 job cùng ghi vào data/latest.xlsx.
concurrency:
  group: attendance-scrape-build
  cancel-in-progress: false

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install openpyxl

      - name: Run scraper (lấy dữ liệu từ LMS)
        env:
          LMS_LOGIN_ID: ${{ secrets.LMS_LOGIN_ID }}
          LMS_LOGIN_PASSWORD: ${{ secrets.LMS_LOGIN_PASSWORD }}
          STAFF_ID: ${{ secrets.LMS_STAFF_ID }}
          MONTHS_BACK: ${{ github.event.inputs.months_back || 'all' }}
          DETAIL_MONTHS_BACK: ${{ github.event.inputs.detail_months_back || '2' }}
        run: node scrape.js

      - name: Build index.html từ dữ liệu vừa lấy
        run: python3 build.py

      - name: Commit và push data/latest.xlsx + index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.xlsx index.html
          git diff --staged --quiet && echo "Không có thay đổi để commit" || git commit -m "Auto scrape + build attendance dashboard [skip ci]"
          git push

      - name: Upload checkpoint nếu job bị lỗi giữa chừng (để debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: attendance-checkpoint
          path: data/.attendance_checkpoint.json
          if-no-files-found: ignore

      - name: Upload ảnh/HTML debug nếu đăng nhập LMS thất bại
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: attendance-login-debug
          path: debug/
          if-no-files-found: ignore
